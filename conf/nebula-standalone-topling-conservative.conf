########## basics ##########
# Whether to run as a daemon process
--daemonize=true
# The file to host the process id
--pid_file=@NEBULA_DATA_DIR@/pids/nebula-standalone.pid
# Whether to enable optimizer
--enable_optimizer=true
# The default charset when a space is created
--default_charset=utf8
# The defaule collate when a space is created
--default_collate=utf8_bin
# Whether to use the configuration obtained from the configuration file
--local_config=true

########## logging ##########
# The directory to host logging files
--log_dir=@NEBULA_DATA_DIR@/logs
# Log level, 0, 1, 2, 3 for INFO, WARNING, ERROR, FATAL respectively
--minloglevel=0
# Verbose log level, 1, 2, 3, 4, the higher of the level, the more verbose of the logging
--v=0
# Maximum seconds to buffer the log messages
--logbufsecs=0
# Whether to redirect stdout and stderr to separate output files
--redirect_stdout=true
# Destination filename of stdout and stderr, which will also reside in log_dir.
--stdout_log_file=standalone-stdout.log
--stderr_log_file=standalone-stderr.log
# Copy log messages at or above this level to stderr in addition to logfiles. The numbers of severity levels INFO, WARNING, ERROR, and FATAL are 0, 1, 2, and 3, respectively.
--stderrthreshold=3
# use max_log_size or log_clean_days to control the log file size and log file clean days. Set log_clean_days to 0 to disable log file cleaning.
--log_clean_days=0

########## query ##########
# Whether to treat partial success as an error.
# This flag is only used for Read-only access, and Modify access always treats partial success as an error.
--accept_partial_success=false
# Maximum sentence length, unit byte
--max_allowed_query_size=4194304

########## networking ##########
# ToplingDB conservative profile: offset +30000 from default standalone ports
--meta_server_addrs=127.0.0.1:39559
--local_ip=127.0.0.1
--listen_netdev=any
--port=39669
--meta_port=39559
--storage_port=39779
--reuse_port=false
--listen_backlog=1024
--client_idle_timeout_secs=28800
--session_idle_timeout_secs=28800
--num_accept_threads=1
--num_netio_threads=0
--num_worker_threads=0
--ws_ip=0.0.0.0
--ws_http_port=39670
--storage_client_timeout_ms=60000
# Must not equal meta_port+1 (raft) or storage_port+1 (raft)
--ws_meta_http_port=39570
--ws_storage_http_port=39880
--heartbeat_interval_secs=10

########## authentication ##########
--enable_authorize=false
--auth_type=password

########## memory ##########
--system_memory_high_watermark_ratio=0.8

########## experimental feature ##########
--enable_experimental_feature=false
--enable_data_balance=true

######### Raft #########
--raft_heartbeat_interval_secs=30
--raft_rpc_timeout_ms=500
--wal_ttl=14400

########## Disk ##########
--data_path=@NEBULA_DATA_DIR@/storage
--minimum_reserved_bytes=268435456
--rocksdb_batch_size=4096
--rocksdb_block_cache=4
--engine_type=rocksdb
--rocksdb_compression=snappy
--rocksdb_compression_per_level=
--enable_rocksdb_statistics=false
--rocksdb_stats_level=kExceptHistogramOrTimers
--enable_rocksdb_prefix_filtering=true
--enable_rocksdb_whole_key_filtering=false

############## rocksdb Options ##############
--rocksdb_db_options={}
--rocksdb_column_family_options={"write_buffer_size":"67108864","max_write_buffer_number":"4","max_bytes_for_level_base":"268435456"}
--rocksdb_block_based_table_options={"block_size":"8192"}

############## meta Options ##############
--meta_data_path=@NEBULA_DATA_DIR@/meta
--default_replica_factor=1
--default_parts_num=10
